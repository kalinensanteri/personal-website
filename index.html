<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>www.santerikalinen.com</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Anton&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      background: url('assets/images/website_horizontal_1.1.3.jpg') center/cover no-repeat;
      color: #d8d8d8;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 12px;
      font-weight: 300;
      line-height: 1.6;
      position: relative;
    }

    /* dark gradient at bottom so text under travellers is readable */
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to top,
        rgba(0,0,0,0.6) 0%,
        rgba(0,0,0,0.2) 30%,
        rgba(0,0,0,0.0) 55%
      );
      pointer-events: none;
    }

    .site-url {
      position: absolute;
      top: 24px;
      left: 32px;
      font-size: 12px;
      color: rgba(220,220,220,0.7);
      text-shadow: 0 1px 4px rgba(0,0,0,0.8);
    }

    .content {
      position: absolute;
      bottom: 3%;
      left: 28%;
      max-width: 360px;
    }

    .bio { margin-bottom: 16px; }
    .bio p {
      margin-bottom: 6px;
      color: #e8e8e8;
      font-size: 13px;
      font-weight: 600;
      text-shadow: 0 1px 8px rgba(0,0,0,1), 0 2px 20px rgba(0,0,0,0.9);
    }
    .bio a {
      color: #e8e8e8;
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      text-shadow: 0 1px 8px rgba(0,0,0,1), 0 2px 20px rgba(0,0,0,0.9);
    }
    .bio a:hover { text-decoration: underline; }

    .brought {
      font-size: 13px;
      font-weight: 600;
      color: #e8e8e8;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      text-shadow: 0 1px 8px rgba(0,0,0,1), 0 2px 20px rgba(0,0,0,0.9);
    }

    /* Oval ring */
    .ring-wrap {
      display: inline-block;
      position: relative;
      width: 88px;
      height: 40px;
      vertical-align: middle;
      flex-shrink: 0;
      overflow: visible;
    }

    .ring-letter {
      position: absolute;
      left: 0;
      top: 0;
      font-family: 'Anton', sans-serif;
      font-size: 10px;
      font-weight: 400;
      line-height: 1;
      white-space: pre;
      transform-origin: center center;
      pointer-events: none;
    }

    /* Temple clickable zone */
    .temple-link {
      position: absolute;
      right: 7%;
      top: 20%;
      width: 19%;
      height: 44%;
      cursor: pointer;
      text-decoration: none;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding-bottom: 8px;
    }

    .temple-label {
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 300;
      color: rgba(220,220,220,0);
      letter-spacing: 0.12em;
      text-transform: lowercase;
      text-shadow: 0 1px 6px rgba(0,0,0,0.9);
      transition: color 0.4s;
      pointer-events: none;
    }

    .temple-link:hover .temple-label {
      color: rgba(220,220,220,0.85);
    }

    @media (orientation: portrait), (max-width: 768px) {
      body {
        background-image: url('assets/images/website_vertical_1.2.1.jpg');
        background-position: center top;
      }
    }
  </style>
</head>
<body>

  <div class="site-url">www.santerikalinen.com</div>

  <div class="content">
    <div class="bio">
      <p>Currently on a quest to help the ones that are not alright, including myself</p>
      <a href="https://www.backto101.com/why">www.backto101.com/why</a>
    </div>

    <div class="brought">
      <span>things I´ve brought to</span>
      <span class="ring-wrap" id="ring-wrap"></span>
      <span>so far</span>
    </div>
  </div>

  <a href="gallery.html" class="temple-link">
    <span class="temple-label">gallery</span>
  </a>

  <script>
    const text  = 'the world';
    const chars = text.split('');
    const N     = chars.length;
    const wrap  = document.getElementById('ring-wrap');

    const cx = 44, cy = 20;
    const rx = 28, ry = 10;
    const step = (2 * Math.PI) / N - 0.38;
    const duration = 14000;
    let start = null;

    const earthColours = [
      '#5B92D8', '#4A7C2F', '#C4922A', '#b0b0b0',
      '#2E8B57', '#1F6B9B', '#8B6914', '#A0522D', '#3CB371',
    ];

    const spans = chars.map((char, i) => {
      const s = document.createElement('span');
      s.className   = 'ring-letter';
      s.textContent = char;
      s.style.color = earthColours[i] || '#b0b0b0';
      wrap.appendChild(s);
      return s;
    });

    function animate(ts) {
      if (!start) start = ts;
      const base = Math.PI / 2 + ((ts - start) / duration) * 2 * Math.PI;

      spans.forEach((span, i) => {
        const theta = base + ((N - 1) / 2 - i) * step;
        const x = cx + rx * Math.cos(theta);
        const y = cy + ry * Math.sin(theta);
        const sinT = Math.sin(theta);
        const scaleX = sinT;
        const scaleY = 0.8 + 0.2 * ((sinT + 1) / 2);
        const opacity = Math.max(0.01, Math.abs(sinT));
        span.style.opacity   = opacity;
        span.style.transform = `translate(${x}px,${y}px) translate(-50%,-50%) scale(${scaleX}, ${scaleY})`;
      });

      requestAnimationFrame(animate);
    }

    requestAnimationFrame(animate);
  </script>

</body>
</html>
