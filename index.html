<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>www.santerikalinen.com</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0a;
      color: #b0b0b0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 12px;
      font-weight: 300;
      line-height: 1.6;
      min-height: 100vh;
    }

    .site-url {
      text-align: center;
      padding: 28px 0 24px;
      font-size: 12px;
      color: #b0b0b0;
    }

    .main {
      max-width: 700px;
      margin: 0 auto;
      padding: 0 32px 60px;
    }

    .bio { margin-bottom: 28px; }
    .bio p { margin-bottom: 6px; color: #b0b0b0; }
    .bio a { color: #b0b0b0; text-decoration: none; }
    .bio a:hover { text-decoration: underline; }

    .hero-img {
      width: 220px;
      display: block;
      margin-bottom: 60px;
    }

    .brought {
      margin-bottom: 40px;
      font-size: 12px;
      color: #b0b0b0;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    /* Oval ring */
    .ring-wrap {
      display: inline-block;
      position: relative;
      width: 90px;
      height: 44px;
      vertical-align: middle;
      flex-shrink: 0;
      overflow: visible;
    }

    .ring-letter {
      position: absolute;
      left: 0;
      top: 0;
      font-size: 10px;
      font-weight: 400;
      line-height: 1;
      white-space: pre;
      transform-origin: center center;
      pointer-events: none;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 32px;
    }

    .item-title {
      font-size: 12px;
      color: #b0b0b0;
      margin-bottom: 12px;
    }

    .item-img {
      width: 100%;
      display: block;
      margin-bottom: 8px;
    }

    .locked-img {
      width: 100%;
      display: block;
      margin-bottom: 8px;
      opacity: 0.25;
      filter: grayscale(1);
    }

    .unlock-label {
      font-size: 11px;
      color: #555;
      margin-top: 6px;
    }

    .doc-title {
      font-size: 12px;
      color: #b0b0b0;
      margin-bottom: 6px;
    }
  </style>
</head>
<body>

  <div class="site-url">www.santerikalinen.com</div>

  <div class="main">

    <div class="bio">
      <p>Currently on a quest to help the ones that are not alright, including myself</p>
      <a href="https://www.backto101.com/why">www.backto101.com/why</a>
    </div>

    <img src="assets/images/hero.png" class="hero-img" alt="" />

    <div class="brought">
      <span>things I´ve brought to</span>
      <span class="ring-wrap" id="ring-wrap"></span>
      <span>so far</span>
    </div>

    <div class="grid">

      <div class="item">
        <div class="item-title">wooden gun collection</div>
        <img src="assets/images/gun-render.png" class="locked-img" alt="wooden gun collection" />
        <div class="unlock-label">unlocked at level 4</div>
      </div>

      <div class="item">
        <div class="item-title">paintings</div>
        <img src="assets/images/painting.jpg" class="item-img" alt="paintings" />
      </div>

      <div class="item">
        <div class="item-title">documentaries</div>
        <div class="doc-title">The Extra Mile - 100km<br>Ultramarathon documentary</div>
        <div class="unlock-label">unlocked at level 2</div>
      </div>

    </div>

  </div>

  <script>
    // "the world" spins as a group around a flat oval.
    // Front (bottom) = fully readable, left-to-right, normal.
    // Sides         = nearly invisible (opacity fades to ~0).
    // Back (top)    = mirrored horizontally, dimmed.
    // Letters stay upright — no individual rotation.

    const text  = 'the world';
    const chars = text.split('');
    const N     = chars.length;
    const wrap  = document.getElementById('ring-wrap');

    // Oval geometry (px, relative to wrap top-left)
    const cx = 45, cy = 22;   // centre
    const rx = 38, ry = 15;   // semi-axes — wide flat oval

    // Angular gap between adjacent letters — small = text-like spacing
    const step = 0.13; // radians (~7.5°)

    const duration = 11000; // ms per full revolution
    let start = null;

    const earthColours = [
      '#5B92D8', // ocean blue   t
      '#4A7C2F', // forest green h
      '#C4922A', // earth/sand   e
      '#b0b0b0', // space        (space char)
      '#2E8B57', // sea green    w
      '#1F6B9B', // deep ocean   o
      '#8B6914', // dry earth    r
      '#A0522D', // sienna       l
      '#3CB371', // meadow       d
    ];

    // Build letter spans
    const spans = chars.map((char, i) => {
      const s = document.createElement('span');
      s.className   = 'ring-letter';
      s.textContent = char;   // space stays as space
      s.style.color = earthColours[i] || '#b0b0b0';
      wrap.appendChild(s);
      return s;
    });

    function animate(ts) {
      if (!start) start = ts;

      // base rotates over time; PI/2 = bottom of oval = front
      const base = Math.PI / 2 + ((ts - start) / duration) * 2 * Math.PI;

      spans.forEach((span, i) => {
        // 't' (i=0) is leftmost at the front.
        // At front (theta=PI/2): higher theta = further left (x decreases).
        // So letter 0 gets the highest theta offset, letter N-1 the lowest.
        const theta = base + ((N - 1) / 2 - i) * step;

        const x = cx + rx * Math.cos(theta);
        const y = cy + ry * Math.sin(theta);

        // sin(theta): +1 at front (PI/2), 0 at sides, -1 at back (3PI/2)
        const sinT = Math.sin(theta);

        // Opacity: 1 at front, ~0 at sides, partial at back
        const opacity = Math.max(0.04, Math.abs(sinT));

        // Mirror when at back half (sinT < 0)
        const flipX = sinT < 0 ? -1 : 1;

        // Perspective scale: larger at front, smaller at back
        const scale = 0.72 + 0.28 * ((sinT + 1) / 2);

        span.style.opacity   = opacity;
        span.style.transform =
          `translate(${x}px,${y}px) translate(-50%,-50%) scaleX(${flipX}) scale(${scale})`;
      });

      requestAnimationFrame(animate);
    }

    requestAnimationFrame(animate);
  </script>

</body>
</html>
