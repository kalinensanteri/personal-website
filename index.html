<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>www.santerikalinen.com</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Anton&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      background: url('assets/images/web_horizontal_5.1.1.jpg') center 60%/cover no-repeat;
      color: #d8d8d8;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 12px;
      font-weight: 300;
      line-height: 1.6;
      position: relative;
    }


    .site-url {
      position: absolute;
      top: 24px;
      left: 32px;
      font-size: 12px;
      color: rgba(220,220,220,0.7);
      text-shadow: 0 1px 4px rgba(0,0,0,0.8);
    }

    .content {
      position: absolute;
      bottom: 3%;
      left: 28%;
      max-width: 360px;
    }

    .bio { margin-bottom: 16px; }
    .bio p {
      margin-bottom: 6px;
      color: #e8e8e8;
      font-size: 13px;
      font-weight: 600;
      text-shadow: 0 1px 8px rgba(0,0,0,1), 0 2px 20px rgba(0,0,0,0.9);
    }
    .bio a {
      color: #e8e8e8;
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      text-shadow: 0 1px 8px rgba(0,0,0,1), 0 2px 20px rgba(0,0,0,0.9);
    }
    .bio a:hover { text-decoration: underline; }

    .brought {
      font-size: 13px;
      font-weight: 600;
      color: #e8e8e8;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      text-shadow: 0 1px 8px rgba(0,0,0,1), 0 2px 20px rgba(0,0,0,0.9);
    }

    /* Oval ring */
    .ring-wrap {
      display: inline-block;
      position: relative;
      width: 88px;
      height: 40px;
      vertical-align: middle;
      flex-shrink: 0;
      overflow: visible;
    }

    .ring-letter {
      position: absolute;
      left: 0;
      top: 0;
      font-family: 'Anton', sans-serif;
      font-size: 10px;
      font-weight: 400;
      line-height: 1;
      white-space: pre;
      transform-origin: center center;
      pointer-events: none;
    }

    /* Temple clickable zone */
    .temple-link {
      position: absolute;
      right: 7%;
      top: 20%;
      width: 19%;
      height: 44%;
      cursor: pointer;
      text-decoration: none;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding-bottom: 8px;
    }

    .temple-label {
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 300;
      color: rgba(220,220,220,0);
      letter-spacing: 0.12em;
      text-transform: lowercase;
      text-shadow: 0 1px 6px rgba(0,0,0,0.9);
      transition: color 0.4s;
      pointer-events: none;
    }

    .temple-link:hover .temple-label {
      color: rgba(220,220,220,0.85);
    }

    @media (orientation: portrait), (max-width: 768px) {
      body {
        background-image: url('assets/images/web_vertical_5.1.2.jpg');
        background-position: center 60%;
      }
    }
  </style>
</head>
<body>

  <a href="gallery.html" class="temple-link">
    <span class="temple-label">gallery</span>
  </a>


</body>
</html>
