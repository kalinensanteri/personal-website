<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>gallery — santerikalinen.com</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&family=Press+Start+2P&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      cursor: url('assets/images/harja_cursor.png') 0 48, auto;
    }

    body {
      background: url('assets/images/gallery_6.1.1.jpg') center/cover no-repeat;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    @media (orientation: portrait), (max-width: 768px) {
      body {
        background-image: url('assets/images/gallery_horizontal_6.1.2.jpg');
      }
    }

    .back-link {
      position: absolute;
      top: 24px;
      left: 28px;
      font-size: 12px;
      font-weight: 300;
      color: rgba(220,220,220,0.75);
      text-decoration: none;
      letter-spacing: 0.04em;
      text-shadow: 0 1px 6px rgba(0,0,0,0.9);
      transition: color 0.3s;
      z-index: 10;
    }

    .back-link:hover {
      color: rgba(255,255,255,1);
    }

    /* Invisible hover zones over each painting */
    .painting-zone {
      position: absolute;
      top: 38%;
      width: 16%;
      height: 50%;
      cursor: pointer;
    }
    .painting-zone.left  { left: 0; }
    .painting-zone.right { right: 0; }

    /* Taulu overlay — fades in on hover */
    .taulu-overlay {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: min(52vw, 70vh);
      height: min(52vw, 70vh);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease-in;
      z-index: 20;
    }
    .taulu-overlay img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    .taulu-caption {
      text-align: center;
      margin-top: 14px;
      font-family: 'Press Start 2P', monospace;
      font-size: 10px;
      color: #ffffff;
      line-height: 1.9;
      letter-spacing: 0.02em;
      text-shadow: 0 1px 6px rgba(0,0,0,0.9);
    }
    .taulu-caption em {
      font-style: italic;
    }
    .taulu-overlay.visible {
      opacity: 1;
    }

    /* Spinning gun — wrapper handles positioning and hover */
    #gun-wrapper {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      top: 53%;
      pointer-events: auto;
    }

    #gun-label {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      color: rgba(220,220,220,0);
      white-space: nowrap;
      text-shadow: 0 1px 6px rgba(0,0,0,1);
      transition: color 0.3s ease;
      pointer-events: none;
      z-index: 5;
    }

    #gun-wrapper:hover #gun-label {
      color: rgba(220,220,220,0.95);
    }

    #gun-container {
      position: relative;
      width: 21vw;
      height: 17vh;
      pointer-events: auto;
    }

    #gun-container canvas {
      width: 100% !important;
      height: 100% !important;
      image-rendering: pixelated;
      transition: filter 0.3s ease;
    }

    #gun-wrapper:hover #gun-container canvas {
      filter: grayscale(1) brightness(0.55);
    }

    /* Screen hover zone */
    #screen-wrapper {
      position: absolute;
      left: 30%;
      top: 36%;
      width: 40%;
      height: 22%;
      pointer-events: auto;
    }

    #screen-tint {
      display: none;
    }

    #screen-label {
      position: absolute;
      top: 42%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      color: transparent;
      white-space: nowrap;
      text-align: center;
      text-shadow: 0 1px 6px rgba(0,0,0,0);
      transition: color 0.3s ease, text-shadow 0.3s ease;
      pointer-events: none;
      z-index: 5;
      line-height: 2;
    }

    #screen-wrapper:hover #screen-label {
      color: rgba(220,220,220,0.95);
      text-shadow: 0 1px 6px rgba(0,0,0,1);
    }

    @media (orientation: portrait), (max-width: 768px) {
      #screen-wrapper {
        left: 18%;
        width: 64%;
        top: 28%;
        height: 32%;
      }
    }

    @media (orientation: portrait), (max-width: 768px) {
      #gun-wrapper { top: 51%; }
      #gun-container { width: 55vw; height: 18vh; }
    }

    /* Tap equivalents for touch devices */
    #gun-wrapper.tapped #gun-label { color: rgba(220,220,220,0.95); }
    #gun-wrapper.tapped #gun-container canvas { filter: grayscale(1) brightness(0.55); }
    #screen-wrapper.tapped #screen-label {
      color: rgba(220,220,220,0.95);
      text-shadow: 0 1px 6px rgba(0,0,0,1);
    }
  </style>
</head>
<body>

  <a href="index.html" class="back-link">← back</a>
  <div id="gun-wrapper">
    <div id="gun-label">unlocked at level 4</div>
    <div id="gun-container"></div>
  </div>

  <!-- Screen hover zone -->
  <div id="screen-wrapper">
    <div id="screen-tint"></div>
    <div id="screen-label">unlocked at level 2</div>
  </div>

  <!-- Hover zones over the two paintings -->
  <div class="painting-zone left"  id="zone-left"></div>
  <div class="painting-zone right" id="zone-right"></div>

  <!-- Taulu overlays -->
  <div class="taulu-overlay" id="taulu1-overlay">
    <img src="assets/images/taulu1.png" alt="painting 1" />
    <div class="taulu-caption"><em>a miracle</em> — made for a dear friend on his birthday.</div>
  </div>
  <div class="taulu-overlay" id="taulu2-overlay">
    <img src="assets/images/taulu2.png" alt="painting 2" />
    <div class="taulu-caption">I hope we meet again</div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { FBXLoader } from 'three/addons/loaders/FBXLoader.js';

    const container = document.getElementById('gun-container');

    // Renderer at 1/8 resolution — CSS stretches it pixelated
    const PIXEL_SCALE = 3;
    const renderer = new THREE.WebGLRenderer({ antialias: false, alpha: true });
    renderer.setPixelRatio(1);
    renderer.setSize(
      Math.max(1, Math.floor(container.clientWidth  / PIXEL_SCALE)),
      Math.max(1, Math.floor(container.clientHeight / PIXEL_SCALE))
    );
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    container.appendChild(renderer.domElement);

    // Scene + camera
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(40, container.clientWidth / container.clientHeight, 0.1, 2000);
    camera.position.set(0, 0, 120);

    // Lighting
    const ambient = new THREE.AmbientLight(0xfff5e0, 2.0);
    scene.add(ambient);
    const key = new THREE.DirectionalLight(0xffffff, 3.0);
    key.position.set(5, 8, 6);
    scene.add(key);
    const fill = new THREE.DirectionalLight(0xffd090, 1.0);
    fill.position.set(-4, 2, 3);
    scene.add(fill);

    // Textures
    const tl = new THREE.TextureLoader();
    const albedo = tl.load('assets/gun/textures/WoodenToyGunAlbedo.png');
    const normal = tl.load('assets/gun/textures/WoodenToyGunNormal.png');
    const rough  = tl.load('assets/gun/textures/WoodenToyGunRough.png');
    const metal  = tl.load('assets/gun/textures/WoodenToyGunMetal.png');
    const ao     = tl.load('assets/gun/textures/WoodenToyGunAO.jpg');
    albedo.colorSpace = THREE.SRGBColorSpace;

    // Load FBX
    let gun = null;
    const loader = new FBXLoader();
    loader.load('assets/gun/source/WoodenToyGun.fbx', (fbx) => {
      fbx.traverse((child) => {
        if (child.isMesh) {
          child.material = new THREE.MeshStandardMaterial({
            map:            albedo,
            normalMap:      normal,
            roughnessMap:   rough,
            metalnessMap:   metal,
            aoMap:          ao,
            aoMapIntensity: 1.0,
          });
          // aoMap needs uv2 — copy uv1 if missing
          if (!child.geometry.attributes.uv1 && child.geometry.attributes.uv) {
            child.geometry.setAttribute('uv1', child.geometry.attributes.uv);
          }
        }
      });

      // Centre and scale to fit view
      const box    = new THREE.Box3().setFromObject(fbx);
      const centre = box.getCenter(new THREE.Vector3());
      fbx.position.sub(centre);
      const size   = box.getSize(new THREE.Vector3());
      const maxDim = Math.max(size.x, size.y, size.z);
      fbx.scale.setScalar(40 / maxDim);

      // Tilt slightly so it reads like a display piece
      fbx.rotation.x = 0.2;

      scene.add(fbx);
      gun = fbx;
    });

    // Resize
    window.addEventListener('resize', () => {
      renderer.setSize(
        Math.max(1, Math.floor(container.clientWidth  / PIXEL_SCALE)),
        Math.max(1, Math.floor(container.clientHeight / PIXEL_SCALE))
      );
      camera.aspect = container.clientWidth / container.clientHeight;
      camera.updateProjectionMatrix();
    });

    // Animate
    function animate() {
      requestAnimationFrame(animate);
      if (gun) gun.rotation.y += 0.008;
      renderer.render(scene, camera);
    }
    animate();
  </script>

  <script>
    const gunWrapper    = document.getElementById('gun-wrapper');
    const screenWrapper = document.getElementById('screen-wrapper');
    const zoneLeft      = document.getElementById('zone-left');
    const zoneRight     = document.getElementById('zone-right');
    const taulu1        = document.getElementById('taulu1-overlay');
    const taulu2        = document.getElementById('taulu2-overlay');

    // Mouse hover for paintings
    zoneLeft.addEventListener('mouseenter',  () => taulu1.classList.add('visible'));
    zoneLeft.addEventListener('mouseleave',  () => taulu1.classList.remove('visible'));
    zoneRight.addEventListener('mouseenter', () => taulu2.classList.add('visible'));
    zoneRight.addEventListener('mouseleave', () => taulu2.classList.remove('visible'));

    // Touch support
    function clearAll() {
      gunWrapper.classList.remove('tapped');
      screenWrapper.classList.remove('tapped');
      taulu1.classList.remove('visible');
      taulu2.classList.remove('visible');
    }

    function makeTappable(el, activate) {
      el.addEventListener('touchstart', (e) => {
        e.preventDefault();
        const active = {
          gun:    () => gunWrapper.classList.contains('tapped'),
          screen: () => screenWrapper.classList.contains('tapped'),
          taulu1: () => taulu1.classList.contains('visible'),
          taulu2: () => taulu2.classList.contains('visible'),
        }[activate]();
        clearAll();
        if (!active) {
          if (activate === 'gun')    gunWrapper.classList.add('tapped');
          if (activate === 'screen') screenWrapper.classList.add('tapped');
          if (activate === 'taulu1') taulu1.classList.add('visible');
          if (activate === 'taulu2') taulu2.classList.add('visible');
        }
      }, { passive: false });
    }

    makeTappable(gunWrapper,    'gun');
    makeTappable(screenWrapper, 'screen');
    makeTappable(zoneLeft,      'taulu1');
    makeTappable(zoneRight,     'taulu2');

    // Tap anywhere else to dismiss
    document.addEventListener('touchstart', (e) => {
      if (![gunWrapper, screenWrapper, zoneLeft, zoneRight].some(el => el.contains(e.target))) {
        clearAll();
      }
    });
  </script>

</body>
</html>
