<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>gallery — santerikalinen.com</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      cursor: url('assets/images/harja_cursor.png') 0 48, auto;
    }

    body {
      background: url('assets/images/gallery_6.1.1.jpg') center/cover no-repeat;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    @media (orientation: portrait), (max-width: 768px) {
      body {
        background-image: url('assets/images/gallery_horizontal_6.1.2.jpg');
      }
    }

    .back-link {
      position: absolute;
      top: 24px;
      left: 28px;
      font-size: 12px;
      font-weight: 300;
      color: rgba(220,220,220,0.75);
      text-decoration: none;
      letter-spacing: 0.04em;
      text-shadow: 0 1px 6px rgba(0,0,0,0.9);
      transition: color 0.3s;
    }

    .back-link:hover {
      color: rgba(255,255,255,1);
    }
  </style>
</head>
<body>

  <a href="index.html" class="back-link">← back</a>
